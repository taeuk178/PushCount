name: Simple Web Scraper Notification

on:
  workflow_dispatch:  # 수동 실행만 가능 (테스트용)

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
        
    - name: Run web scraper
      id: scraper
      run: |
        python simple_scraper.py
        echo "SCRAPE_TIME=$(date)" >> $GITHUB_OUTPUT
        echo "STATUS=success" >> $GITHUB_OUTPUT
        
    - name: Create Issue with Results
      uses: actions/github-script@v6
      with:
        script: |
          const title = `웹 크롤링 결과 - ${{ steps.scraper.outputs.SCRAPE_TIME }}`;
          const body = `
          ## 웹 크롤링 완료! 🚀
          
          - **실행 시간**: ${{ steps.scraper.outputs.SCRAPE_TIME }}
          - **상태**: ${{ steps.scraper.outputs.STATUS }} ✅
          - **대상 이메일**: nous178@icloud.com
          
          크롤링이 성공적으로 완료되었습니다.
          이 이슈는 이메일 알림을 대신합니다.
          `;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['scraping-result', 'notification']
          });
