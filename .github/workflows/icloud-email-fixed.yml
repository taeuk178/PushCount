name: iCloud Email Fixed Test

on:
  workflow_dispatch:  # 수동 실행 가능

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
        
    - name: Run web scraper
      run: |
        python simple_scraper.py > scraper_results.txt
        echo "스크래핑 완료 시간: $(date)" >> scraper_results.txt
        echo "크롤링 테스트가 성공적으로 완료되었습니다! ✅" >> scraper_results.txt
        
    - name: Send iCloud email notification (Fixed)
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.mail.me.com
        server_port: 587
        secure: true
        username: ${{ secrets.userEmail }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "[웹 크롤링 완료] 테스트 결과"
        to: nous178@icloud.com
        from: ${{ secrets.userEmail }}
        body: |
          안녕하세요! 
          
          웹 크롤링 테스트가 성공적으로 완료되었습니다! 🚀
          
          📊 실행 정보:
          - 실행 시간: $(date)
          - 상태: 성공 ✅
          - 크롤링 대상: 테스트 API (httpbin.org)
          
          상세 결과는 첨부파일을 확인해주세요.
          
          감사합니다!
          웹 크롤러 봇 🤖
        attachments: scraper_results.txt
